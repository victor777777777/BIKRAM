<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BARMAN DIGITAL SEVA | Premium Online Services</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --primary: #6366f1;
            --accent: #0ea5e9;
            --bg-dark: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-light: #f8fafc;
            --whatsapp: #25D366;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* --- Background Glow --- */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            z-index: -1;
        }

        header {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            border-bottom: 4px solid var(--primary);
            padding: 0 20px;
        }

        .logo-area h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            background: rgba(37, 211, 102, 0.15);
            color: var(--whatsapp);
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            border: 1px solid var(--whatsapp);
            display: inline-block;
            margin-bottom: 25px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        .container { max-width: 1200px; margin: -60px auto 60px; padding: 0 20px; }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .service-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 35px 25px;
            border-radius: 24px;
            text-align: center;
            transition: 0.4s ease;
        }

        .service-card:hover {
            transform: translateY(-12px);
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
            margin-top: 80px;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 45px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Form Styling */
        .booking-form input, .booking-form select {
            width: 100%;
            padding: 16px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: white;
        }

        .btn-submit {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: var(--whatsapp);
            width: 65px; height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            text-decoration: none;
            z-index: 999;
        }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <header>
        <div class="animate_animated animate_fadeInDown">
            <span class="status-badge">● Active & Serving</span>
            <div class="logo-area"><h1>BARMAN DIGITAL SEVA</h1></div>
            <p style="font-size: 1.2rem;">Professional Digital & Government Documentation Hub</p>
        </div>
    </header>

    <div class="container">
        <div class="services-grid">
            <div class="service-card animate_animated animate_fadeInUp"><i class="fas fa-train"></i><h3>Tatkal Tikit</h3></div>
            <div class="service-card animate_animated animate_fadeInUp"><i class="fas fa-fingerprint"></i><h3>Aadhar Services</h3></div>
            <div class="service-card animate_animated animate_fadeInUp"><i class="fas fa-id-badge"></i><h3>Voter & PAN</h3></div>
        </div>

        <div class="main-layout">
            <div class="glass-panel">
                <h2>Contact Info</h2>
                <p><i class="fas fa-map-marker-alt"></i> Burirhat, West Bengal</p>
                <p><i class="fas fa-envelope"></i> bikrambarman16203@gmail.com</p>
            </div>

            <div class="glass-panel">
                <h2>Priority Booking</h2>
                <form id="appointmentForm" class="booking-form">
                    <input type="text" id="userName" placeholder="Full Name" required>
                    <input type="tel" id="userPhone" placeholder="Mobile Number" required>
                    <select id="userService" required>
                        <option value="" disabled selected>Select Service</option>
                        <option>Aadhar Correction</option>
                        <option>Tatkal Ticket</option>
                        <option>PAN Card</option>
                    </select>
                    <button type="submit" class="btn-submit">Request via WhatsApp</button>
                </form>
            </div>
        </div>
    </div>

    <a href="https://wa.me/9382990459" class="whatsapp-float"><i class="fab fa-whatsapp"></i></a>

    <script>
        document.getElementById('appointmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form values
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const service = document.getElementById('userService').value;
            
            // WhatsApp Business Logic
            const businessNumber = "9382990459";
            const message = Hello Bikram! I'd like to book a service.%0A%0A*Name:* ${name}%0A*Phone:* ${phone}%0A*Service:* ${service};
            
            // Show a quick visual confirmation before redirecting
            const btn = e.target.querySelector('button');
            btn.innerText = "Redirecting...";
            btn.style.background = "#25D366";

            setTimeout(() => {
                window.open(https://wa.me/${businessNumber}?text=${message}, '_blank');
                btn.innerText = "Request via WhatsApp";
                btn.style.background = "linear-gradient(90deg, var(--primary), var(--accent))";
            }, 800);
        });

        // Simple Reveal Animation on Scroll
        window.addEventListener('scroll', () => {
            let cards = document.querySelectorAll('.service-card');
            cards.forEach(card => {
                let position = card.getBoundingClientRect().top;
                if(position < window.innerHeight - 100) {
                    card.style.opacity = "1";
                }
            });
        });
    </script>

</body>
</html>
